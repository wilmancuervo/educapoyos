services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: educapoyos-db
    environment:
      SA_PASSWORD: "EduApoyos_Pass2025!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'EduApoyos_Pass2025!' -Q 'SELECT 1' -b -No"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: educapoyos-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=EduApoyosDb;User Id=sa;Password=EduApoyos_Pass2025!;TrustServerCertificate=True;"
      Jwt__Key: "EduApoyos_SuperSecretKey_2025_MustBe32CharsMin!"
      Jwt__Issuer: "EduApoyosAPI"
      Jwt__Audience: "EduApoyosClient"
      Jwt__ExpirationMinutes: "60"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: educapoyos-frontend
  #   ports:
  #     - "4200:80"
  #   depends_on:
  #     - api

volumes:
  sqlserver_data:
